<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/student_logout.css') }}">
<title>Logout Successful</title>
<style>
    body {
        margin: 0;
        padding: 0;
        font-family: "Poppins", sans-serif;
        background: #f5f7fa;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    .success-container {
        text-align: center;
    }

    /* Double-layer circle with checkmark */
    .check-circle {
        position: relative;
        width: 120px;
        height: 120px;
        margin: 0 auto 25px;
    }

    .check-circle::before, .check-circle::after {
        content: '';
        position: absolute;
        border-radius: 50%;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
    }

    .check-circle::before {
        border: 4px solid #28a745;
        animation: rotate1 1s linear infinite;
    }

    .check-circle::after {
        border: 8px solid #28a74533;
    }

    .checkmark {
        position: absolute;
        top: 30%;
        left: 22%;
        width: 50%;
        height: 25%;
        border-left: 6px solid #28a745;
        border-bottom: 6px solid #28a745;
        transform: rotate(-45deg);
    }

    h1 {
        font-size: 28px;
        color: #004d66;
        margin-bottom: 10px;
    }

    p {
        font-size: 16px;
        color: #333;
        margin-bottom: 20px;
    }

    .back-btn {
        display: inline-block;
        padding: 10px 25px;
        background: #004d66;
        color: white;
        text-decoration: none;
        border-radius: 8px;
        font-size: 15px;
        transition: 0.25s;
    }

    .back-btn:hover {
        background: #016a85;
    }

    @keyframes rotate1 {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
    }
</style>
</head>
<body>

<div class="success-container">
    <div class="check-circle">
        <div class="checkmark"></div>
    </div>
    <h1>Logout Successful</h1>
    <p>You have been successfully logged out of the Student Panel.</p>
    <a href="{{ url_for('login') }}" class="back-btn">Login Again</a>
</div>

</body>
</html>
