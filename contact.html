<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Us - Dr. Panjabroa Deshmukh Polytechnic Institute</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/contact.css') }}">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
{% include "header.html" %}
<div class="container">
    <!-- LEFT SIDE -->
    <div class="left-side">
        <img src="https://cdn-icons-png.flaticon.com/512/561/561127.png" alt="Contact Illustration" class="contact-illustration">
        <h1>Get in Touch</h1>
        <p>We value your feedback and queries. Fill out the form and our admin team will get back to you promptly.</p>
    </div>

    <!-- RIGHT SIDE -->
    <div class="right-side">
        <form class="contact-form" method="POST" action="/contact-submit">
            <div class="input-row">
                <div class="input-group">
                    <input type="text" name="first_name" placeholder=" " required>
                    <label>First Name</label>
                </div>
                <div class="input-group">
                    <input type="text" name="last_name" placeholder=" " required>
                    <label>Last Name</label>
                </div>
            </div>

            <div class="input-group">
                <input type="email" name="email" placeholder=" " required>
                <label>Email Address</label>
            </div>

            <div class="input-group">
                <input type="tel" name="phone" placeholder=" " required>
                <label>Phone Number</label>
            </div>

            <div class="input-group">
                <textarea name="message" rows="5" placeholder=" " required></textarea>
                <label>Your Message</label>
            </div>

            <button type="submit" class="submit-btn">Send Message</button>
        </form>
    </div>
</div>

{% include "footer.html" %}
</body>
</html>
